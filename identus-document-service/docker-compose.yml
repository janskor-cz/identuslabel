version: '3.8'

services:
  identus-document-service:
    build: .
    container_name: identus-document-service
    restart: unless-stopped
    ports:
      - "3020:3020"
    env_file:
      - .env
    environment:
      - PORT=3020
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
